apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wso2-api-manager-hpa
  namespace: customerx
  labels:
    customer: CustomerX
    app: api-manager
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wso2-api-manager
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Replicas
        value: 1
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Replicas
        value: 2
        periodSeconds: 60
