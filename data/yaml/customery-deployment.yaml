apiVersion: apps/v1
kind: Deployment
metadata:
  name: wso2-api-manager
  namespace: customery
  labels:
    customer: CustomerY
    app: api-manager
    version: "4.1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-manager
  template:
    metadata:
      labels:
        app: api-manager
        version: "4.1.0"
    spec:
      containers:
      - name: wso2am
        image: wso2/wso2am:4.1.0
        ports:
        - containerPort: 9443
          name: https-management
        - containerPort: 8243
          name: https-gateway
        - containerPort: 8280
          name: http-gateway
        resources:
          requests:
            memory: "1536Mi"
            cpu: "500m"
          limits:
            memory: "3Gi"
            cpu: "1500m"
        env:
        - name: JAVA_OPTS
          value: "-Xms1024m -Xmx2048m -XX:+UseG1GC"
        - name: WSO2_SERVER_PROFILE
          value: "default"
        livenessProbe:
          httpGet:
            path: /services/Version
            port: 9763
            scheme: HTTP
          initialDelaySeconds: 120
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /services/Version
            port: 9763
            scheme: HTTP
          initialDelaySeconds: 90
          periodSeconds: 15
          failureThreshold: 3
      nodeSelector:
        agentpool: agentpool
      tolerations: []
