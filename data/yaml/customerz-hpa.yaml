apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wso2-gateway-hpa
  namespace: customerz
  labels:
    customer: CustomerZ
    app: wso2-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wso2-gateway
  minReplicas: 5
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 900
      policies:
      - type: Replicas
        value: 1
        periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Replicas
        value: 3
        periodSeconds: 60
