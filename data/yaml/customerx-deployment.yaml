apiVersion: apps/v1
kind: Deployment
metadata:
  name: wso2-api-manager
  namespace: customerx
  labels:
    customer: CustomerX
    app: api-manager
    version: "4.2.1"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-manager
  template:
    metadata:
      labels:
        app: api-manager
    spec:
      containers:
      - name: wso2am
        image: wso2/wso2am:4.2.1
        ports:
        - containerPort: 9443
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
