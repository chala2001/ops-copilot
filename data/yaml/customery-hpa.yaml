apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wso2-api-manager-hpa
  namespace: customery
  labels:
    customer: CustomerY
    app: api-manager
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wso2-api-manager
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
      - type: Replicas
        value: 1
        periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Replicas
        value: 1
        periodSeconds: 60
